---
applications:
- name: java-task-application
  memory: 512M
  no-route: true
  health-check-type: process
  instances: 0
  path: build/libs/java-task-application-1.0.0.BUILD-SNAPSHOT.jar
  buildpacks:
  - java_buildpack
  env:
    JBP_CONFIG_OPEN_JDK_JRE: '{ jre: { version: 21.+ } }'
    # Default: buildpack detects Spring Boot via Start-Class in MANIFEST.MF.
    # Application.java runs via JarLauncher.
    #
    # To test plain-Java main class override (JavaMain buildpack framework):
    #   JBP_CONFIG_JAVA_MAIN: '{ class: "org.cloudfoundry.test.AlternateMain" }'
    #
    # Run as a one-off CF task after push:
    #   cf run-task java-task-application --name my-task

